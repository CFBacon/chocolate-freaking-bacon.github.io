<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>CFBACON Button Demo</title>
	<style>
		*{box-sizing:border-box}
		html,body{height:100%;margin:0}
		body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;background:#ff9cc9;font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial}
		.site-header{width:100%;background:#ff9cc9;padding:30px 0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 8px rgba(0,0,0,0.08)}
		.site-header h1{margin:0;color:#fff;font-size:36px;font-weight:800;letter-spacing:0.8px;padding:0 24px;-webkit-text-stroke:1px #000;text-shadow:
			-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000}
		.container{display:flex;gap:160px;align-items:center;justify-content:center;flex:1}
		.btn{background:linear-gradient(#ff9cc9,#e24b84);border:none;width:380px;height:96px;font-size:24px;border-radius:16px;box-shadow:0 18px 36px rgba(0,0,0,0.20);cursor:pointer;transition:transform 120ms ease,box-shadow 120ms ease;outline:1px solid #000;outline-offset:0}
		.btn:focus{outline:1px solid #000;outline-offset:4px}
		.btn.pressed,.btn:active{transform:translateY(8px);box-shadow:0 8px 16px rgba(0,0,0,0.16)}
	</style>
</head>
<body>
	<header class="site-header">
		<h1>Thank You For Choosing Chocolate Freaking Bacon</h1>
	</header>
	<div class="container">
			<button id="cta1" class="btn" aria-pressed="false">Our Facebook</button>
			<button id="cta2" class="btn" aria-pressed="false">Our Website</button>
	</div>
	<script>
		const buttons = document.querySelectorAll('.btn');
		function setPressed(el, on){
			if(on){
				el.classList.add('pressed');
				el.setAttribute('aria-pressed','true');
			} else {
				el.classList.remove('pressed');
				el.setAttribute('aria-pressed','false');
			}
		}
		buttons.forEach(btn => {
			btn.addEventListener('mousedown', ()=> setPressed(btn, true));
			btn.addEventListener('mouseleave', ()=> setPressed(btn, false));
			btn.addEventListener('touchstart', ()=> setPressed(btn, true));
			btn.addEventListener('touchend', ()=> setPressed(btn, false));
			btn.addEventListener('keydown', (e)=>{
				if(e.key === ' ' || e.key === 'Spacebar' || e.key === 'Enter') setPressed(btn, true);
			});
			btn.addEventListener('keyup', (e)=>{
				if(e.key === ' ' || e.key === 'Spacebar' || e.key === 'Enter') setPressed(btn, false);
			});
			btn.addEventListener('click', ()=>{
				const orig = btn.style.background;
				btn.style.background = 'linear-gradient(#ffd7ec,#ffb6dd)';
				setTimeout(()=> btn.style.background = orig, 150);
				if(btn.id === 'cta1'){
					window.open('https://www.facebook.com/profile.php?id=61569340587483','_blank');
				} else if(btn.id === 'cta2'){
					window.open('https://chocolatefreakingbacon.com/','_blank');
				}
			});
		});
		document.addEventListener('mouseup', ()=> buttons.forEach(b=> setPressed(b, false)));
		// Buttons use fixed CSS width/height; JS width equalization removed.
	</script>
</body>
</html>
